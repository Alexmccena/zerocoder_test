runtime:
  environment: dev

exchange:
  testnet: true
  private_state_enabled: false

observability:
  log_level: DEBUG

strategy:
  name: smc_scalper_v1
  smc_scalper_v1:
    history:
      entry_bars: 24
      structure_bars: 16
      bias_bars: 16
      orderbook_snapshots: 8
      oi_points: 5
    sweep:
      lookback_bars: 6
    exit:
      max_hold_bars: 4

replay:
  max_gap_seconds: 120

symbols:
  allowlist:
    - BTCUSDT

storage:
  market_archive_root: data/dev_market_archive

llm:
  enabled: true
  provider: openrouter
  timeout_seconds: 20
  default_language: en
  workflows:
    pre_session_enabled: true
    periodic_enabled: true
    periodic_interval_minutes: 30
    post_trade_enabled: true
    risk_halt_enabled: true
  budgets:
    max_calls_per_hour: 8
    max_calls_per_day: 40
    max_input_tokens_per_day: 120000
    max_output_tokens_per_day: 24000
    max_cost_usd_per_day: 3.0
  routing:
    active_stack: stack_a
    stack_a:
      analyst_model: deepseek/deepseek-chat-v3-0324:free
      critic_model: qwen/qwen3-235b-a22b:free
      reporter_model: meta-llama/llama-3.3-70b-instruct
  execution_mode: single_analyst
