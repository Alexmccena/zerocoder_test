runtime:
  mode: live
  environment: prod
  dry_run: false

exchange:
  primary: binance
  testnet: false
  private_state_enabled: true

symbols:
  allowlist:
    - ETHUSDT

market_data:
  kline_intervals:
    - 1m
  bootstrap_kline_limit: 30
  enable_trades: false
  enable_ticker: false
  enable_liquidations: false
  enable_open_interest: false
  enable_funding: false

live:
  execution_enabled: true
  allow_mainnet: true
  startup_recovery_policy: flatten
  symbol_allowlist:
    - ETHUSDT
  max_order_notional_usdt: 40
  max_position_notional_usdt: 40
  max_total_exposure_usdt: 40
  private_state_stale_after_seconds: 180

strategy:
  name: phase3_placeholder
  default_timeframe: 1m
  placeholder:
    signal_threshold_bps: 0.0
    min_imbalance: 0.0
    max_hold_closed_klines: 999
    stop_loss_bps: 20.0
    take_profit_rr: 0.05

risk:
  max_open_positions: 1
  risk_per_trade: 0.002
