config_version: 5

runtime:
  service_name: trading-bot
  mode: paper
  environment: dev
  dry_run: false
  replay_source: null
  timezone: UTC

exchange:
  primary: bybit
  market_type: linear_perp
  position_mode: one_way
  account_alias: default
  testnet: true
  private_state_enabled: false
  recv_window_ms: 5000

symbols:
  allowlist:
    - BTCUSDT
    - ETHUSDT

market_data:
  orderbook_depth: 50
  kline_intervals:
    - 1m
    - 5m
    - 15m
  enable_trades: true
  enable_ticker: true
  enable_liquidations: true
  enable_open_interest: true
  enable_funding: true
  bootstrap_kline_limit: 200
  open_interest_poll_interval_seconds: 300
  funding_poll_interval_seconds: 300
  ws_reconnect_min_seconds: 1
  ws_reconnect_max_seconds: 30

storage:
  postgres_dsn: ""
  redis_dsn: ""
  market_archive_root: data/market_archive
  parquet_compression: zstd
  parquet_flush_rows: 5000
  parquet_flush_seconds: 5

observability:
  log_level: INFO
  http_host: 0.0.0.0
  http_port: 8080

alerts:
  telegram:
    enabled: false
    chat_ids: []
    allowed_chat_ids: []
    allowed_user_ids: []
    poll_interval_seconds: 2
    long_poll_timeout_seconds: 15
    min_severity: info
    startup_enabled: true
    shutdown_enabled: true
    command_echo_enabled: true
    risk_halt_enabled: true
    protection_failure_enabled: true

strategy:
  name: phase3_placeholder
  default_timeframe: 1m
  placeholder:
    signal_threshold_bps: 8
    min_imbalance: 0.10
    max_hold_closed_klines: 3
    stop_loss_bps: 12
    take_profit_rr: 1.5
  smc_scalper_v1:
    bias_timeframe: 15m
    structure_timeframe: 5m
    entry_timeframe: 1m
    history:
      entry_bars: 160
      structure_bars: 96
      bias_bars: 64
      orderbook_snapshots: 120
      oi_points: 32
      liquidation_events: 200
    structure:
      swing_lookback_bars: 2
      min_break_bps: 2
      max_signal_age_bars: 6
    sweep:
      lookback_bars: 20
      reclaim_within_bars: 2
      min_penetration_bps: 3
    fvg:
      min_gap_bps: 2
      max_age_bars: 8
    order_block:
      impulse_displacement_bps: 15
      max_age_bars: 12
    orderbook:
      imbalance_levels: 5
      min_abs_imbalance: 0.12
      wall_distance_bps: 20
      wall_size_vs_median: 3.0
      wall_min_persistence_snapshots: 3
    open_interest:
      lookback_points: 3
      min_delta_bps: 5
    funding:
      enabled: true
      adverse_threshold: 0.0005
      missing_is_neutral: true
    liquidations:
      enabled: false
      burst_window_seconds: 5
      min_same_side_events: 3
      missing_is_neutral: true
    confirmations:
      min_support_count: 2
    entry:
      mode: market_first
      allow_limit_retest: false
      max_setup_age_bars: 3
    exit:
      max_hold_bars: 10
      invalidation_buffer_bps: 2
      take_profit_rr: 2.0
  grid_dca_v1:
    max_actions_per_tick: 8
    persist_events: true
    pairs:
      - symbol: BTCUSDT
        leverage: 5
        budget_quote: 600
        stack_size_quote: 300
        corridor_pct: 10
        take_profit_pct: 0.5
        orders_per_stack: 40
        lower_threshold_pct: 12
        upper_threshold_pct: 1
        enabled: true

risk:
  max_open_positions: 2
  risk_per_trade: 0.0025
  max_daily_loss: 0.015
  stale_market_data_seconds: 2
  one_position_per_symbol: true
  leverage_cap: 5
  max_consecutive_losses: 3
  cooldown_minutes_after_loss_streak: 30
  funding_blackout_minutes_before: 5
  funding_blackout_minutes_after: 5

execution:
  default_entry_type: market
  limit_ttl_ms: 3000
  market_slippage_guard_bps: 10.0
  max_market_data_age_ms: 2000
  reconciliation_interval_seconds: 5
  flatten_on_protection_failure: true

paper:
  initial_equity_usdt: 10000
  default_order_notional_usdt: 100
  maker_fee_bps: 2.0
  taker_fee_bps: 5.5
  fill_latency_ms: 150
  limit_fill_visible_ratio: 0.25
  allow_partial_limit_fills: true

live:
  execution_enabled: false
  allow_mainnet: false
  symbol_allowlist: []
  max_order_notional_usdt: 100
  max_position_notional_usdt: 100
  max_total_exposure_usdt: 100
  startup_recovery_timeout_seconds: 20
  private_state_stale_after_seconds: 10
  rest_resync_interval_seconds: 15
  cancel_ack_timeout_seconds: 5
  startup_recovery_policy: halt

replay:
  source_root: null
  start_at: null
  end_at: null
  speed: 1.0
  warmup_minutes: 15
  fail_on_gap: true
  max_gap_seconds: 30

llm:
  enabled: false
  provider: none
  model_name: ""
  timeout_seconds: 30
  default_language: en
  workflows:
    pre_session_enabled: true
    periodic_enabled: true
    periodic_interval_minutes: 15
    post_trade_enabled: true
    risk_halt_enabled: true
  budgets:
    max_calls_per_hour: 24
    max_calls_per_day: 240
    max_input_tokens_per_day: 1500000
    max_output_tokens_per_day: 300000
    max_cost_usd_per_day: 20.0
  routing:
    active_stack: stack_a
    stack_a:
      analyst_model: deepseek/deepseek-chat-v3-0324:free
      critic_model: qwen/qwen3-235b-a22b:free
      reporter_model: meta-llama/llama-3.3-70b-instruct
    stack_b:
      analyst_model: mistralai/mistral-medium-3
      critic_model: anthropic/claude-3.7-sonnet
      reporter_model: google/gemini-2.0-flash-001
  execution_mode: single_analyst
